<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>madcop</title>
<link rel="icon" href="/static/mascot.png" type="image/png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #242424; --surface3: #2e2e2e;
  --border: #333; --text: #e8e8e8; --text-dim: #888; --text-faint: #555;
  --accent: #10a37f; --accent-hover: #1ab892;
  --moon: #c084fc; --moon-dim: #7c5fa8; --moon-bg: rgba(192,132,252,.08);
  --danger: #ef4444; --warn: #f59e0b;
  --radius: 10px; --sidebar-w: 260px;
}
[data-theme="light"] {
  --bg: #ffffff; --surface: #f7f7f8; --surface2: #ececf1; --surface3: #e0e0e6;
  --border: #d9d9e3; --text: #1a1a1a; --text-dim: #6e6e80; --text-faint: #999;
  --moon-bg: rgba(192,132,252,.05);
}
html { font-size: 15px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; -webkit-font-smoothing: antialiased; }

/* ============ SIDEBAR ============ */
.sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width .2s; }
.sidebar.collapsed { width: 0; border: none; }
.sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.mascot-mini { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
.brand { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
.brand .ver { font-size: 10px; color: var(--text-dim); font-weight: 400; margin-left: 4px; }
.sidebar-actions { margin-left: auto; display: flex; gap: 4px; }
.icon-btn { width: 30px; height: 30px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 6px; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.icon-btn:hover { background: var(--surface3); color: var(--text); }
.new-btn { margin: 10px; padding: 9px 12px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: all .15s; width: calc(100% - 20px); }
.new-btn:hover { background: var(--surface2); border-color: var(--accent); }
.search-box { margin: 0 10px 8px; position: relative; }
.search-box input { width: 100%; padding: 7px 10px 7px 30px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; outline: none; }
.search-box input:focus { border-color: var(--accent); }
.search-box svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
.conv-list { flex: 1; overflow-y: auto; padding: 0 6px; }
.conv-item { padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-dim); margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
.conv-item:hover { background: var(--surface2); color: var(--text); }
.conv-item.active { background: var(--surface3); color: var(--text); }
.conv-item .del { opacity: 0; color: var(--danger); font-size: 12px; margin-left: auto; flex-shrink: 0; }
.conv-item:hover .del { opacity: .6; }
.conv-item .del:hover { opacity: 1; }
.sidebar-footer { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.rage-bar { flex: 1; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; cursor: help; }
.rage-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--warn), var(--danger)); border-radius: 2px; transition: width .3s; }
.rage-label { font-size: 10px; color: var(--text-dim); white-space: nowrap; }

/* ============ MAIN ============ */
.main { flex: 1; display: flex; flex-direction: column; position: relative; }
.topbar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface); }
.topbar .toggle-sidebar { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; padding: 4px; }
.model-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 5px 10px; font-size: 12px; cursor: pointer; outline: none; }
.topbar-spacer { flex: 1; }
.strength-group { display: flex; gap: 2px; background: var(--surface2); border-radius: 6px; padding: 2px; }
.strength-btn { padding: 4px 10px; border: none; background: transparent; color: var(--text-dim); font-size: 11px; cursor: pointer; border-radius: 4px; transition: all .15s; }
.strength-btn.active { background: var(--accent); color: white; }

.messages { flex: 1; overflow-y: auto; padding: 20px 0; scroll-behavior: smooth; }
.msg { max-width: 760px; margin: 0 auto 16px; padding: 0 20px; }
.msg .role-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
.msg .role-label .mascot-tag { display: inline-flex; align-items: center; gap: 4px; }
.msg .role-label .mascot-tag img { width: 16px; height: 16px; border-radius: 50%; }
.msg-content { font-size: 15px; line-height: 1.7; word-wrap: break-word; }
.msg-content p { margin-bottom: 8px; }
.msg-content h1, .msg-content h2, .msg-content h3, .msg-content h4 { margin: 16px 0 8px; font-weight: 600; line-height: 1.3; }
.msg-content h1 { font-size: 22px; }
.msg-content h2 { font-size: 19px; }
.msg-content h3 { font-size: 17px; }
.msg-content h4 { font-size: 15px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .3px; }
.msg-content pre { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; margin: 8px 0; font-size: 13px; line-height: 1.5; }
.msg-content pre code { background: transparent; padding: 0; }
.msg-content code { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
.msg-content :not(pre) > code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.msg-content ul, .msg-content ol { margin: 8px 0; padding-left: 24px; }
.msg-content li { margin-bottom: 4px; }
.msg-content ul li::marker { color: var(--accent); }
.msg-content ol li::marker { color: var(--accent); }
.msg-content blockquote { border-left: 3px solid var(--accent); padding: 4px 12px; margin: 8px 0; color: var(--text-dim); background: var(--surface2); border-radius: 0 4px 4px 0; }
.msg-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.msg-content a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .15s; }
.msg-content a:hover { border-bottom-color: var(--accent); }
.msg-content table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
.msg-content th, .msg-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.msg-content th { background: var(--surface2); font-weight: 600; }
.msg-content tr:nth-child(even) td { background: var(--surface2); }
.msg-content strong { font-weight: 600; }
.msg-content img { max-width: 100%; border-radius: 8px; margin: 8px 0; }

/* Reasoning - no icons, pure text */
.reasoning-block { background: var(--moon-bg); border-left: 2px solid var(--moon-dim); padding: 8px 12px; margin: 4px 0 8px; border-radius: 0 6px 6px 0; font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.reasoning-toggle { cursor: pointer; font-size: 12px; color: var(--moon); margin-bottom: 2px; user-select: none; }
.reasoning-toggle:hover { text-decoration: underline; }
.reasoning-text { white-space: pre-wrap; }

/* Thinking animation */
.thinking-dots { display: inline-flex; gap: 4px; align-items: center; }
.thinking-dots span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse-dot 1.4s infinite ease-in-out; }
.thinking-dots span:nth-child(1) { animation-delay: 0s; }
.thinking-dots span:nth-child(2) { animation-delay: .2s; }
.thinking-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes pulse-dot { 0%, 80%, 100% { opacity: .3; transform: scale(.8); } 40% { opacity: 1; transform: scale(1.2); } }

/* Tool call display */
.tool-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; margin: 4px 0; font-size: 12px; }
.tool-block .tool-header { color: var(--accent); font-weight: 600; margin-bottom: 2px; }
.tool-block .tool-args { color: var(--text-dim); font-family: monospace; }
.tool-block .tool-result { color: var(--text); margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border); white-space: pre-wrap; max-height: 200px; overflow-y: auto; }

/* Welcome */
.welcome { max-width: 760px; margin: 60px auto; text-align: center; padding: 0 20px; }
.welcome .mascot-large { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(192,132,252,.3)); }
.welcome h1 { font-size: 26px; margin-bottom: 6px; }
.welcome p { color: var(--text-dim); margin-bottom: 24px; font-size: 14px; }

/* ============ COMPOSER ============ */
.composer { padding: 12px 20px 16px; border-top: 1px solid var(--border); background: var(--surface); }
.composer-inner { max-width: 760px; margin: 0 auto; }
.composer-row { display: flex; gap: 8px; align-items: flex-end; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; }
.composer-row:focus-within { border-color: var(--accent); }
.composer textarea { flex: 1; background: transparent; border: none; color: var(--text); padding: 6px 4px; font-size: 15px; resize: none; min-height: 28px; max-height: 200px; font-family: inherit; outline: none; line-height: 1.5; }
.composer textarea::placeholder { color: var(--text-faint); }
.attach-btn, .voice-btn, .send-btn { width: 32px; height: 32px; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: all .15s; }
.attach-btn, .voice-btn { background: transparent; color: var(--text-dim); }
.attach-btn:hover, .voice-btn:hover { background: var(--surface3); color: var(--text); }
.voice-btn.recording { background: var(--danger); color: white; animation: pulse-rec 1s infinite; }
@keyframes pulse-rec { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
.send-btn { background: var(--accent); color: white; }
.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { background: var(--surface3); color: var(--text-faint); cursor: not-allowed; }
.composer-hint { text-align: center; font-size: 11px; color: var(--text-faint); margin-top: 6px; }
.attach-preview { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.attach-preview .attach-item { font-size: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; display: flex; align-items: center; gap: 4px; }
.attach-preview .attach-item .remove { color: var(--danger); cursor: pointer; }
.file-input { display: none; }

/* ============ SETTINGS PAGE ============ */
.settings-page { max-width: 640px; margin: 30px auto; padding: 0 20px; display: none; }
.settings-page.active { display: block; }
.settings-page h2 { font-size: 20px; margin-bottom: 16px; }
.settings-page h3 { font-size: 15px; margin: 20px 0 10px; color: var(--text-dim); }
.provider-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
.provider-card.active { border-color: var(--accent); }
.provider-card .pc-row { display: flex; justify-content: space-between; align-items: center; }
.provider-card .pc-name { font-weight: 600; font-size: 14px; }
.provider-card .pc-meta { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
.provider-card .pc-actions { display: flex; gap: 8px; }
.provider-card .pc-actions a { font-size: 12px; cursor: pointer; color: var(--text-dim); }
.provider-card .pc-actions a:hover { color: var(--accent); }
.provider-card .pc-actions a.danger:hover { color: var(--danger); }
.field-group { margin-bottom: 14px; }
.field-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.field-group input, .field-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 14px; outline: none; }
.field-group input:focus, .field-group select:focus { border-color: var(--accent); }
.btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface3); color: var(--text); }
.btn-row { display: flex; gap: 8px; margin-top: 16px; }
.flash { padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 10px; }
.flash.ok { background: rgba(16,163,127,.15); color: var(--accent); }
.flash.err { background: rgba(239,68,68,.15); color: var(--danger); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <img src="/static/mascot.png" class="mascot-mini" alt="madcop">
    <div class="brand">madcop<span class="ver">v2.1</span></div>
    <div class="sidebar-actions">
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">&#9788;</button>
      <button class="icon-btn" onclick="showSettings()" title="设置">&#9881;</button>
    </div>
  </div>
  <button class="new-btn" onclick="newConversation()">+ 新对话</button>
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="搜索历史会话..." oninput="searchConversations()">
  </div>
  <div class="conv-list" id="convList"></div>
  <div class="sidebar-footer">
    <div class="rage-bar" title="怒气值 (上下文使用率)"><div class="rage-fill" id="rageFill"></div></div>
    <span class="rage-label" id="rageLabel">0%</span>
    <button class="icon-btn" onclick="showMemory()" title="记忆">&#9779;</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <button class="toggle-sidebar" onclick="toggleSidebar()">&#9776;</button>
    <select class="model-select" id="modelSelect" onchange="onModelChange()">
      <option value="">默认模型</option>
    </select>
    <div class="topbar-spacer"></div>
    <div class="strength-group">
      <button class="strength-btn" data-strength="0.3" onclick="setStrength(this)">低</button>
      <button class="strength-btn active" data-strength="0.7" onclick="setStrength(this)">中</button>
      <button class="strength-btn" data-strength="1.0" onclick="setStrength(this)">高</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <img src="/static/mascot.png" class="mascot-large" alt="madcop">
      <h1>madcop</h1>
      <p>你的本地 AI Agent 框架 · 支持 Web 搜索、天气查询、文件操作</p>
    </div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <div class="attach-preview" id="attachPreview"></div>
      <div class="composer-row">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="附件">&#128206;</button>
        <input type="file" class="file-input" id="fileInput" onchange="onFileSelect(event)" multiple>
        <textarea id="input" placeholder="输入消息... (Enter 发送)" rows="1"></textarea>
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="语音输入">&#127908;</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#9658;</button>
      </div>
      <div class="composer-hint">Enter 发送 · Shift+Enter 换行 · madcop 可以搜索网页、查天气、读写文件</div>
    </div>
  </div>
</div>

<!-- SETTINGS PAGE -->
<div class="settings-page" id="settingsPage">
  <h2>设置</h2>
  <div id="flashMsg"></div>
  <h3>已配置的 Provider</h3>
  <div id="providerList"></div>
  <h3>添加 / 更新 Provider</h3>
  <div class="field-group">
    <label>Provider</label>
    <select id="providerSelect" onchange="onPresetSelect()">
      <option value="">— 选择 —</option>
    </select>
  </div>
  <div class="field-group">
    <label>API Base URL</label>
    <input type="text" id="baseUrlInput" placeholder="https://api.openai.com/v1">
  </div>
  <div class="field-group">
    <label>API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-...">
  </div>
  <div class="field-group">
    <label>Model</label>
    <input type="text" id="modelInput" placeholder="gpt-4o-mini">
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="saveProvider()">保存</button>
    <button class="btn btn-secondary" onclick="showChat()">返回</button>
  </div>
</div>

<!-- MEMORY PAGE -->
<div class="settings-page" id="memoryPage">
  <h2>记忆</h2>
  <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">madcop 会自动记住你的身份、偏好和重要信息。你也可以手动添加或删除记忆。</p>
  <div class="field-group">
    <label>手动添加记忆</label>
    <div style="display:flex;gap:6px;">
      <input type="text" id="memoryInput" placeholder="例: 用户喜欢吃火锅" style="flex:1;">
      <button class="btn btn-primary" onclick="addMemoryManual()">添加</button>
    </div>
  </div>
  <h3>已有记忆 (<span id="memoryCount">0</span>)</h3>
  <div id="memoryList"></div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="showChat()">返回聊天</button>
  </div>
</div>

<script>
// ========== STATE ==========
let conversations = [];
let activeConvId = null;
let presets = [];
let streaming = false;
let temperature = 0.7;
let attachments = [];
let recognition = null;

// Token estimation (rough: 1 token ~ 4 chars)
function estimateTokens(text) { return Math.ceil(text.length / 4); }
const CONTEXT_WINDOW = 128000; // default, updated per model

// ========== THEME ==========
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('madcop-theme', next);
  document.getElementById('themeBtn').innerHTML = next === 'dark' ? '&#9788;' : '&#9789;';
}
(function initTheme() {
  const saved = localStorage.getItem('madcop-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').innerHTML = saved === 'dark' ? '&#9788;' : '&#9789;';
})();

// ========== SIDEBAR ==========
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ========== CONVERSATIONS (localStorage) ==========
function loadConversations() {
  try {
    const raw = localStorage.getItem('madcop-conversations');
    if (raw) conversations = JSON.parse(raw);
  } catch(e) { conversations = []; }
}
function saveConversations() {
  try {
    // Keep only last 50 conversations
    if (conversations.length > 50) conversations = conversations.slice(-50);
    localStorage.setItem('madcop-conversations', JSON.stringify(conversations));
  } catch(e) {}
}
function newConversation() {
  const id = Date.now().toString();
  conversations.push({ id, title: '新对话', messages: [], model: '', createdAt: id });
  activeConvId = id;
  saveConversations();
  renderConvList();
  renderMessages();
}
function deleteConversation(id, ev) {
  ev.stopPropagation();
  conversations = conversations.filter(c => c.id !== id);
  if (activeConvId === id) activeConvId = conversations.length ? conversations[conversations.length-1].id : null;
  saveConversations();
  renderConvList();
  renderMessages();
}
function searchConversations() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderConvList(q);
}
function getActiveConv() {
  if (!activeConvId) { newConversation(); }
  return conversations.find(c => c.id === activeConvId);
}
function renderConvList(filter) {
  const el = document.getElementById('convList');
  el.innerHTML = '';
  let list = conversations.slice().reverse();
  if (filter) list = list.filter(c => c.title.toLowerCase().includes(filter) || c.messages.some(m => m.content.toLowerCase().includes(filter)));
  list.forEach(c => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (c.id === activeConvId ? ' active' : '');
    div.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;flex:1">${esc(c.title)}</span><span class="del" onclick="deleteConversation('${c.id}', event)">x</span>`;
    div.onclick = () => { activeConvId = c.id; renderConvList(); renderMessages(); };
    el.appendChild(div);
  });
}

// ========== RAGE METER ==========
function updateRageMeter() {
  const conv = getActiveConv();
  if (!conv) return;
  const totalText = conv.messages.map(m => (m.content||'') + (m.reasoning||'')).join('');
  const tokens = estimateTokens(totalText);
  const pct = Math.min(100, Math.round(tokens / CONTEXT_WINDOW * 100));
  document.getElementById('rageFill').style.width = pct + '%';
  document.getElementById('rageLabel').textContent = pct + '%';
}

// ========== SETTINGS ==========
async function loadSettings() {
  const r = await fetch('/api/settings');
  const data = await r.json();
  presets = data.presets || [];
  const active = data.providers.find(p => p.provider_id === data.active_provider);
  // Update model dropdown
  const sel = document.getElementById('modelSelect');
  sel.innerHTML = '<option value="">默认模型</option>';
  data.providers.forEach(p => {
    sel.innerHTML += `<option value="${p.model}" ${p.provider_id === data.active_provider ? 'selected' : ''}>${p.label} · ${p.model}</option>`;
  });
  // Provider list
  const list = document.getElementById('providerList');
  list.innerHTML = '';
  if (!data.providers.length) list.innerHTML = '<p style="color:var(--text-dim);font-size:13px;">还没有配置 Provider</p>';
  data.providers.forEach(p => {
    const card = document.createElement('div');
    card.className = 'provider-card' + (p.provider_id === data.active_provider ? ' active' : '');
    card.innerHTML = `<div class="pc-row"><div><div class="pc-name">${p.label || p.provider_id} ${p.provider_id === data.active_provider ? '&#10003;' : ''}</div><div class="pc-meta">${p.model} · ${p.api_key_masked || 'no key'}</div></div><div class="pc-actions">${p.provider_id !== data.active_provider ? `<a onclick="setActive('${p.provider_id}')">设为默认</a>` : ''}<a onclick="editProvider('${p.provider_id}')">编辑</a><a class="danger" onclick="deleteProvider('${p.provider_id}')">删除</a></div></div>`;
    list.appendChild(card);
  });
  // Preset dropdown
  const ps = document.getElementById('providerSelect');
  ps.innerHTML = '<option value="">— 选择 —</option>';
  presets.forEach(p => { ps.innerHTML += `<option value="${p.id}" data-base="${p.base_url}" data-model="${p.default_model}">${p.label}</option>`; });
}
function onPresetSelect() {
  const sel = document.getElementById('providerSelect');
  const opt = sel.options[sel.selectedIndex];
  if (opt.value) {
    document.getElementById('baseUrlInput').value = opt.dataset.base || '';
    document.getElementById('modelInput').value = opt.dataset.model || '';
  }
}
function editProvider(id) {
  const sel = document.getElementById('providerSelect');
  for (let i = 0; i < sel.options.length; i++) { if (sel.options[i].value === id) { sel.selectedIndex = i; break; } }
  onPresetSelect();
}
async function saveProvider() {
  const sel = document.getElementById('providerSelect');
  const providerId = sel.value || 'custom';
  const baseUrl = document.getElementById('baseUrlInput').value.trim();
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const model = document.getElementById('modelInput').value.trim();
  const label = sel.options[sel.selectedIndex]?.text || providerId;
  if (!baseUrl || !model) { showFlash('请填写 Base URL 和 Model', 'err'); return; }
  const r = await fetch('/api/settings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ provider_id: providerId, base_url: baseUrl, api_key: apiKey, model, label }) });
  if (r.ok) { document.getElementById('apiKeyInput').value = ''; showFlash('保存成功', 'ok'); await loadSettings(); } else { showFlash('保存失败', 'err'); }
}
async function setActive(id) { await fetch('/api/settings/active', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ provider_id: id }) }); await loadSettings(); }
async function deleteProvider(id) { if (!confirm('确定删除？')) return; await fetch('/api/settings/' + id, { method: 'DELETE' }); await loadSettings(); }
function showFlash(msg, type) { const el = document.getElementById('flashMsg'); el.innerHTML = `<div class="flash ${type}">${msg}</div>`; setTimeout(() => el.innerHTML = '', 3000); }
function showSettings() { document.getElementById('settingsPage').classList.add('active'); document.querySelector('.main').style.display = 'none'; loadSettings(); }
function showChat() {
  document.getElementById('settingsPage').classList.remove('active');
  document.getElementById('memoryPage').classList.remove('active');
  document.querySelector('.main').style.display = '';
}

function showMemory() {
  document.getElementById('settingsPage').classList.remove('active');
  document.getElementById('memoryPage').classList.add('active');
  document.querySelector('.main').style.display = 'none';
  loadMemory();
}

async function loadMemory() {
  const r = await fetch('/api/memory');
  const data = await r.json();
  const items = [
    ...(data.semantic || []).map(m => ({...m, layer: 'semantic'})),
    ...(data.episodic || []).map(m => ({...m, layer: 'episodic'})),
    ...(data.reflective || []).map(m => ({...m, layer: 'reflective'})),
  ];
  document.getElementById('memoryCount').textContent = items.length;
  const list = document.getElementById('memoryList');
  if (!items.length) {
    list.innerHTML = '<p style="color:var(--text-dim);font-size:13px;">还没有任何记忆。开始对话或手动添加。</p>';
    return;
  }
  list.innerHTML = '';
  items.forEach(m => {
    const card = document.createElement('div');
    card.className = 'provider-card';
    const layerLabel = {semantic: '知识', episodic: '事件', reflective: '偏好'}[m.layer] || m.layer;
    card.innerHTML = `<div class="pc-row"><div style="flex:1;"><div class="pc-name">${esc(m.title || '')}</div><div class="pc-meta">${layerLabel} · ${esc((m.tags || []).join(', '))}</div></div><div class="pc-actions"><a class="danger" onclick="deleteMemory('${m.id}')">删除</a></div></div>`;
    list.appendChild(card);
  });
}

async function addMemoryManual() {
  const input = document.getElementById('memoryInput');
  const content = input.value.trim();
  if (!content) return;
  const r = await fetch('/api/memory', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ kind: 'semantic', title: content.slice(0, 30), content, tags: ['manual', 'user-profile'] }),
  });
  if (r.ok) { input.value = ''; loadMemory(); } else { alert('添加失败'); }
}

async function deleteMemory(id) {
  if (!confirm('确定删除这条记忆？')) return;
  await fetch('/api/memory/' + id, { method: 'DELETE' });
  loadMemory();
}

// ========== MODEL / STRENGTH ==========
function onModelChange() {
  const sel = document.getElementById('modelSelect');
  const conv = getActiveConv();
  if (conv) conv.model = sel.value;
}
function setStrength(btn) {
  document.querySelectorAll('.strength-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  temperature = parseFloat(btn.dataset.strength);
}

// ========== FILE ATTACHMENT ==========
function onFileSelect(ev) {
  const files = Array.from(ev.target.files);
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = () => { attachments.push({ name: f.name, type: f.type, data: reader.result }); renderAttachments(); };
    reader.readAsDataURL(f);
  });
  ev.target.value = '';
}
function renderAttachments() {
  const el = document.getElementById('attachPreview');
  el.innerHTML = '';
  attachments.forEach((a, i) => {
    el.innerHTML += `<span class="attach-item">${a.name}<span class="remove" onclick="attachments.splice(${i},1); renderAttachments();">x</span></span>`;
  });
}

// ========== VOICE INPUT ==========
function toggleVoice() {
  const btn = document.getElementById('voiceBtn');
  if (recognition) {
    recognition.stop();
    recognition = null;
    btn.classList.remove('recording');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('浏览器不支持语音识别'); return; }
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onresult = (ev) => {
    let text = '';
    for (let i = 0; i < ev.results.length; i++) text += ev.results[i][0].transcript;
    document.getElementById('input').value = text;
  };
  recognition.onend = () => { btn.classList.remove('recording'); recognition = null; };
  recognition.start();
  btn.classList.add('recording');
}

// ========== CHAT ==========
function renderMessages() {
  const el = document.getElementById('messages');
  const conv = getActiveConv();
  if (!conv || conv.messages.length === 0) {
    el.innerHTML = `<div class="welcome" id="welcome"><img src="/static/mascot.png" class="mascot-large" alt="madcop"><h1>madcop</h1><p>你的本地 AI Agent 框架 · 支持 Web 搜索、天气查询、文件操作</p></div>`;
    updateRageMeter();
    return;
  }
  el.innerHTML = '';
  conv.messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    let html = '';
    if (m.role === 'user') {
      html = `<div class="role-label">你</div><div class="msg-content">${formatContent(m.content)}</div>`;
    } else {
      html = `<div class="role-label"><span class="mascot-tag"><img src="/static/mascot.png"> madcop</span></div>`;
      if (m.toolCalls && m.toolCalls.length) {
        m.toolCalls.forEach(tc => {
          html += `<div class="tool-block"><div class="tool-header">${esc(tc.name)}</div><div class="tool-args">${esc(JSON.stringify(tc.args))}</div>${tc.result ? `<div class="tool-result">${esc(tc.result)}</div>` : ''}</div>`;
        });
      }
      if (m.reasoning) {
        html += `<div class="reasoning-toggle" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">推理过程 (点击展开/折叠)</div><div class="reasoning-block reasoning-text" style="display:none">${esc(m.reasoning)}</div>`;
      }
      html += `<div class="msg-content">${formatContent(m.content)}</div>`;
    }
    div.innerHTML = html;
    el.appendChild(div);
  });
  // Highlight code
  el.querySelectorAll('pre code').forEach(block => { try { hljs.highlightElement(block); } catch(e) {} });
  el.scrollTop = el.scrollHeight;
  updateRageMeter();
}

function formatContent(text) {
  if (!text) return '';
  // Strip model-specific tool-call XML tags before markdown rendering
  text = text.replace(/<minimax:tool_call>[\s\S]*?<\/minimax:tool_call>/g, '');
  text = text.replace(/<invoke[\s\S]*?<\/invoke>/g, '');
  text = text.replace(/<parameter[\s\S]*?<\/parameter>/g, '');
  text = text.replace(/<\/?(?:minimax|invoke|parameter|function_calls)[^>]*>/g, '');
  // Render markdown via marked.js + sanitize via DOMPurify
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });
    const raw = marked.parse(text);
    return DOMPurify.sanitize(raw, { ADD_ATTR: ['target'] });
  }
  // Fallback: basic HTML escape
  return esc(text).replace(/\n/g, '<br>');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function sendMessage() {
  if (streaming) return;
  const textarea = document.getElementById('input');
  const text = textarea.value.trim();
  if (!text && !attachments.length) return;
  const conv = getActiveConv();
  const userMsg = { role: 'user', content: text + (attachments.length ? '\n\n[附件: ' + attachments.map(a => a.name).join(', ') + ']' : '') };
  conv.messages.push(userMsg);
  if (conv.messages.filter(m => m.role === 'user').length === 1) conv.title = text.slice(0, 30);
  textarea.value = '';
  textarea.style.height = 'auto';
  const sentAttachments = attachments.slice();
  attachments = [];
  renderAttachments();
  renderConvList();
  renderMessages();

  // Placeholder assistant message
  const aMsg = { role: 'assistant', content: '', reasoning: '', toolCalls: [] };
  conv.messages.push(aMsg);
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg assistant';
  msgDiv.innerHTML = `<div class="role-label"><span class="mascot-tag"><img src="/static/mascot.png"> madcop</span></div><div id="live-stream"><div class="thinking-dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(msgDiv);
  document.getElementById('messages').scrollTop = 999999;

  streaming = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    // Build messages array — send last N messages to fit context
    const histMessages = conv.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
    // Trim if too many tokens
    let totalChars = histMessages.reduce((s, m) => s + m.content.length, 0);
    while (totalChars > CONTEXT_WINDOW * 3.5 && histMessages.length > 2) {
      histMessages.shift();
      totalChars = histMessages.reduce((s, m) => s + m.content.length, 0);
    }

    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ messages: histMessages, temperature })
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if (evt.type === 'reasoning') { aMsg.reasoning += evt.content; }
          else if (evt.type === 'text') { aMsg.content += evt.content; }
          else if (evt.type === 'tool') { aMsg.toolCalls.push({ name: evt.name, args: evt.args, result: null }); }
          else if (evt.type === 'tool_result') {
            const tc = aMsg.toolCalls[aMsg.toolCalls.length - 1];
            if (tc) tc.result = evt.result;
          }
          else if (evt.type === 'done') { aMsg.model = evt.model; }
          else if (evt.type === 'error') { aMsg.content += '\n\nError: ' + evt.message; }
          updateLiveStream(aMsg);
        } catch(e) {}
      }
    }
  } catch (e) {
    aMsg.content += '\n\nNetwork error: ' + e.message;
  } finally {
    streaming = false;
    document.getElementById('sendBtn').disabled = false;
    saveConversations();
    renderMessages();
  }
}

function updateLiveStream(aMsg) {
  const el = document.getElementById('live-stream');
  if (!el) return;
  let html = '';
  if (aMsg.toolCalls && aMsg.toolCalls.length) {
    aMsg.toolCalls.forEach(tc => {
      html += `<div class="tool-block"><div class="tool-header">${esc(tc.name)}</div><div class="tool-args">${esc(JSON.stringify(tc.args))}</div>${tc.result ? `<div class="tool-result">${esc(tc.result.slice(0, 500))}</div>` : '<div class="thinking-dots"><span></span><span></span><span></span></div>'}</div>`;
    });
  }
  if (aMsg.reasoning) {
    html += `<div class="reasoning-toggle" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">推理过程 (点击展开/折叠)</div><div class="reasoning-block" style="display:none">${esc(aMsg.reasoning)}</div>`;
  }
  if (aMsg.content) {
    html += `<div class="msg-content">${formatContent(aMsg.content)}</div>`;
  }
  if (!html) html = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
  el.innerHTML = html;
  document.getElementById('messages').scrollTop = 999999;
  updateRageMeter();
}

// ========== INPUT HANDLING ==========
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

// ========== INIT ==========
loadConversations();
if (conversations.length) { activeConvId = conversations[conversations.length-1].id; renderConvList(); renderMessages(); }
loadSettings();
</script>
